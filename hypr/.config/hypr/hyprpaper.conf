# hyprpaper configuration
# Docs: https://wiki.hypr.land/Hypr-Ecosystem/hyprpaper/
#
# To change the wallpaper, point `preload` and `wallpaper` at your image,
# then run: hyprctl hyprpaper reload ,/path/to/image

preload = /home/seanleishman/Pictures/wallpapers/arch_purple.png

# `,` before the path means "apply to all monitors"
wallpaper = ,/home/seanleishman/Pictures/wallpapers/arch_purple.png

# Keep wallpapers loaded in memory after a monitor is unplugged
ipc = on
splash = false
