unbind r
bind r source-file ~/.tmux.conf

set -s set-clipboard on
set -sg escape-time 0

# Mouse: click/drag to select & resize panes, scroll into copy-mode.
set -g mouse on
# Let focus events reach apps (nvim :autoread, gitsigns refresh, etc.).
set -g focus-events on

set -g prefix C-a
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set-environment -g COLORTERM "truecolor"

setw -g mode-keys vi
# vi-style copy-mode: v begin selection, y copy, Ctrl-v rectangle toggle.
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key C-a send-prefix

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin "janoamaral/tokyo-night-tmux"

set -g @tokyo-night-tmux_window_id_style digital
set -g @tokyo-night-tmux_pane_id_style hsquare
set -g @tokyo-night-tmux_zoom_id_style dsquare

set -g @tokyo-night-tmux_show_music 1

set -g status-position top

set-option -g history-limit 25000

bind c new-window -c "#{pane_current_path}"
# Splits open in the current pane's directory (overrides pain-control's | and -).
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
set -g renumber-windows on

run '~/.tmux/plugins/tpm/tpm'
